<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3ECF8E" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#3ECF8E" stop-opacity="0"/>
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="rounded">
      <rect width="512" height="512" rx="96" ry="96"/>
    </clipPath>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)" clip-path="url(#rounded)"/>

  <!-- Subtle glow overlay -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#glow)" clip-path="url(#rounded)"/>

  <!-- Subtle grid lines (technical feel) -->
  <g opacity="0.03" stroke="#fff" stroke-width="1">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>

  <!-- Top accent glow line -->
  <rect x="0" y="0" width="512" height="3" fill="#3ECF8E" opacity="0.4" rx="1.5" clip-path="url(#rounded)"/>

  <!-- Terminal Chevron Icon -->
  <g transform="translate(256, 256)">
    <!-- Outer glow chevron -->
    <polyline
      points="-80,-40 -10,-40 60,0 -10,40 -80,40"
      fill="none"
      stroke="#3ECF8E"
      stroke-width="32"
      stroke-linecap="round"
      stroke-linejoin="round"
      opacity="0.15"
      filter="url(#neon)"
      transform="translate(0, 0)"/>

    <!-- Main chevron -->
    <polyline
      points="-80,-40 -10,-40 60,0 -10,40 -80,40"
      fill="none"
      stroke="#3ECF8E"
      stroke-width="28"
      stroke-linecap="round"
      stroke-linejoin="round"/>

    <!-- Inner bright chevron -->
    <polyline
      points="-80,-40 -10,-40 60,0 -10,40 -80,40"
      fill="none"
      stroke="#7AE5B5"
      stroke-width="10"
      stroke-linecap="round"
      stroke-linejoin="round"
      opacity="0.5"/>
  </g>

  <!-- Small decorative dots (orbital) -->
  <circle cx="128" cy="384" r="4" fill="#3ECF8E" opacity="0.15"/>
  <circle cx="384" cy="128" r="3" fill="#3ECF8E" opacity="0.1"/>
  <circle cx="384" cy="384" r="2" fill="#3ECF8E" opacity="0.08"/>
</svg>
